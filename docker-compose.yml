# docker-compose.yml — SuperClaw Pure
# Quick start: docker compose up -d
# Access: http://localhost:4070

services:
  superclaw:
    build: .
    container_name: superclaw-pure
    restart: unless-stopped
    ports:
      - "4070:4070"
    volumes:
      - superclaw-data:/data
      - superclaw-workspace:/workspace
    environment:
      - NODE_ENV=production
      - PORT=4070
      # Provider API keys (set in .env or here)
      # - OPENAI_API_KEY=sk-...
      # - ANTHROPIC_API_KEY=sk-ant-...
      # - GOOGLE_AI_API_KEY=...
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4070/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  superclaw-data:
  superclaw-workspace:
