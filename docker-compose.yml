# docker-compose.yml — HiveClaw Pure
# Quick start: docker compose up -d
# Access: http://localhost:4070

services:
  hiveclaw:
    image: ghcr.io/danilocaffaro/hiveclaw-pure:latest
    # Or build locally: comment out 'image' and uncomment 'build'
    # build: .
    container_name: hiveclaw-pure
    restart: unless-stopped
    ports:
      - "4070:4070"
    volumes:
      - hiveclaw-data:/data
      - hiveclaw-workspace:/workspace
    environment:
      - NODE_ENV=production
      - PORT=4070
      - SUPERCLAW_DB_PATH=/data/hiveclaw.db
      - SUPERCLAW_WORKSPACE=/workspace
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4070/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  hiveclaw-data:
  hiveclaw-workspace:
